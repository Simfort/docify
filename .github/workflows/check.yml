name: Check
on: push
jobs:
  ci-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install deps
        run: cd ./frontend && npm i
      - name: Lint
        run: cd ./frontend && npm run lint
      - name: Build project
        run: cd ./frontend && npm run build
      - name: Testin project
        run: cd ./frontend && npm run test
